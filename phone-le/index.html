<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Phonele — Guess the phone</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <div class="card left">
    <div class="header">
      <div class="title">Phonele — guess the phone</div>
      <div class="controls">
        <button id="newBtn">New phone</button>
      </div>
    </div>

    <div class="phone-preview">
      <div class="phone-device" id="phoneDevice">
        <div class="badge" id="badge">?</div>
        <div class="screen" id="screen">Loading…</div>
      </div>

      <div class="meta">
        <div class="input-row">
          <input id="guessInput" placeholder='Type e.g. "Samsung Galaxy A54"' autocomplete="off" />
          <button id="submitBtn">Guess</button>
        </div>
        <div class="hint">Categories shown: Brand, Model, CPU, Skin</div>
        <div class="history" id="history"></div>
      </div>
    </div>
  </div>

  <div class="card right">
    <div style="font-weight:700;margin-bottom:8px">Target phone categories</div>
    <div id="targetList" class="target-list"></div>

    <div style="height:10px"></div>
    <div class="small muted">Static site: put <code>phones.txt</code> next to these files. If fetch is blocked by file://, use a simple static server.</div>

    <div class="footer">
      <div class="small muted">Static demo</div>
      <div id="status" class="small muted"></div>
    </div>
  </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
